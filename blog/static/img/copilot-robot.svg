<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#0d1117"/>

  <!-- Antenna -->
  <rect x="47" y="8" width="6" height="12" rx="3" fill="#58a6ff"/>
  <circle cx="50" cy="8" r="4" fill="#58a6ff"/>

  <!-- Head -->
  <rect x="22" y="20" width="56" height="40" rx="8" fill="#21262d"/>
  <rect x="24" y="22" width="52" height="36" rx="6" fill="#30363d"/>

  <!-- Eyes -->
  <rect x="30" y="32" width="16" height="12" rx="3" fill="#0d1117"/>
  <rect x="54" y="32" width="16" height="12" rx="3" fill="#0d1117"/>
  <!-- Eye glow -->
  <rect x="32" y="34" width="12" height="8" rx="2" fill="#58a6ff" opacity="0.9"/>
  <rect x="56" y="34" width="12" height="8" rx="2" fill="#58a6ff" opacity="0.9"/>
  <!-- Eye highlight -->
  <circle cx="37" cy="37" r="2" fill="white" opacity="0.6"/>
  <circle cx="61" cy="37" r="2" fill="white" opacity="0.6"/>

  <!-- Mouth -->
  <rect x="32" y="50" width="36" height="5" rx="2" fill="#0d1117"/>
  <rect x="34" y="51" width="6" height="3" rx="1" fill="#58a6ff"/>
  <rect x="42" y="51" width="6" height="3" rx="1" fill="#58a6ff"/>
  <rect x="50" y="51" width="6" height="3" rx="1" fill="#58a6ff"/>
  <rect x="58" y="51" width="6" height="3" rx="1" fill="#58a6ff"/>

  <!-- Neck -->
  <rect x="44" y="60" width="12" height="6" rx="2" fill="#21262d"/>

  <!-- Body -->
  <rect x="18" y="66" width="64" height="28" rx="8" fill="#21262d"/>
  <rect x="20" y="68" width="60" height="24" rx="6" fill="#30363d"/>

  <!-- Chest panel -->
  <rect x="30" y="73" width="40" height="14" rx="3" fill="#0d1117"/>
  <circle cx="40" cy="80" r="4" fill="#238636" opacity="0.9"/>
  <circle cx="50" cy="80" r="4" fill="#58a6ff" opacity="0.9"/>
  <circle cx="60" cy="80" r="4" fill="#8957e5" opacity="0.9"/>

  <!-- Arms -->
  <rect x="4" y="66" width="12" height="22" rx="6" fill="#30363d"/>
  <rect x="84" y="66" width="12" height="22" rx="6" fill="#30363d"/>

  <!-- GitHub Copilot logo mark (simplified) -->
  <text x="50" y="97" text-anchor="middle" font-family="monospace" font-size="5" fill="#58a6ff" opacity="0.7">COPILOT</text>
</svg>
